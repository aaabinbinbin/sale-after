services:
  redis:
    image: redis:7
    container_name: after_sales_redis
    ports:
      - "6379:6379"
    command: >
      redis-server
        --requirepass 123456
        --databases 16
    # Redis 密码 123456，Spring Boot 侧通过 spring.data.redis.database=1 选择 DB1
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: after_sales_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: aftersales
      RABBITMQ_DEFAULT_PASS: aftersales123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: after_sales_pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: after_sales_vector
    # 容器启动时自动创建 pgvector 扩展
    command: >
      postgres
        -c shared_preload_libraries=vector
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      # 初始化脚本：确保 vector 扩展启用
      - ./docs/sql/pg_init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  redis_data:
  rabbitmq_data:
  pgvector_data:
