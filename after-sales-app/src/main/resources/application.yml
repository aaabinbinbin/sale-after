spring:
  application:
    name: after-sales-agent-platform
  profiles:
    active: local

  # 数据源配置（MySQL）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/after_sales_agent?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 123456

  # Redis 配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # RabbitMQ 配置
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: aftersales
    password: aftersales123
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms

  # Spring AI 配置
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        enabled: true
        model: gpt-4o
      embedding:
        enabled: true
        model: text-embedding-3-small

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis 配置
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.aftersales.infra.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 服务端口
server:
  port: 8080

# Knife4j API 文档
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

# 售后业务配置
after-sales:
  # 售后窗口期（天）
  return-window-days: 7
  # 换货库存锁定 TTL（分钟）
  stock-lock-ttl-minutes: 30
  # Agent confirm token TTL（分钟）
  confirm-token-ttl-minutes: 15
  # 幂等记录过期时间（天）
  idempotency-expire-days: 7
