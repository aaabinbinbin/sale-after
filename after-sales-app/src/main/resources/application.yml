spring:
  application:
    name: after-sales-agent-platform
  profiles:
    active: local

  # 数据源配置（MySQL 本机 127.0.0.1:3306）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/after_sales_agent?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 123456

  # Redis 配置（Docker Desktop，密码 123456，使用 DB1 防止冲突）
  data:
    redis:
      host: 127.0.0.1
      port: 16379
      password: 123456
      database: 1
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # RabbitMQ 配置（Docker Desktop）
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: aftersales
    password: aftersales123
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms

  # Spring AI 配置（LLM / Embedding API）
  ai:
    openai:
      api-key: ${MY_API_KEY:sk-5641ab74b69d42c58becbc826a39204c}
      base-url: ${MY_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        enabled: true
        options:
          model: qwen3.6-flash
      embedding:
        enabled: true
        options:
          model: qwen3-vl-rerank

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis 配置
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.aftersales.infra.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 服务端口
server:
  port: 8080

# Knife4j API 文档
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

# 售后业务配置
after-sales:
  return-window-days: 7
  stock-lock-ttl-minutes: 30
  confirm-token-ttl-minutes: 15
  idempotency-expire-days: 7
