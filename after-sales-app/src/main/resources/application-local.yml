# 本地开发配置
logging:
  level:
    com.aftersales: DEBUG
    com.aftersales.infra.mapper: DEBUG
    org.springframework.data.redis: INFO
    org.springframework.amqp: INFO

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/after_sales_agent?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowMultiQueries=true&createDatabaseIfNotExist=true
    username: root
    password: root

  # 本地开发 SQL 初始化
  sql:
    init:
      mode: never  # 手动执行 SQL 脚本，避免自动执行导致数据丢失

after-sales:
  # 本地开发允许 MySQL fallback 用于 RAG 向量检索
  rag:
    mysql-fallback-enabled: true
    # pgvector 未就绪时使用 MySQL 做简单 keyword 检索，仅用于开发
